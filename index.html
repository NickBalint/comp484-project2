<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>This is your Giga Pet</h1>
    </header>

    <main class="pet-app">
      <section class="pet-image-container">
        <img class="pet-image" src="images/hound.jpg" alt="A happy hound gigapet">
      </section>

      <section class="dashboard">
        <h2 class="pet-title">Daily Pet Dashboard</h2>
        <div>
          Active Pet:
          <strong>
            <select class="pet-select" aria-label="Select pet"></select>
          </strong>
        </div>
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        <div>Cleanliness: <strong><span class="cleanliness"></span>%</strong></div>

        <div class="button-container">
          <button class="treat-button">Treat</button>
          <button class="play-button">Play</button>
          <button class="exercise-button">Exercise</button>
          <button class="groom-button">Groom</button>
        </div>

        <p class="pet-comment" aria-live="polite"></p>

        <section class="history-panel" aria-live="polite">
          <h3>Recent Actions</h3>
          <ul class="history-list"></ul>
        </section>
      </section>
    </main>

    <!-- Your web-app is https, so your scripts need to be too -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
  </body>
</html>
